<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Compete — one beautiful place to track competitions and never miss a deadline." />
    <title>Compete</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <meta name="theme-color" content="#F3F5FA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C101D" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spline+Sans+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before first paint to avoid a flash.
      try {
        const t = localStorage.getItem("compete.theme");
        const dark = t ? t === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.classList.add("dark");
      } catch {}
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Skeleton shown for the instant before React mounts; replaced on render. -->
      <style>
        .sk-wrap { max-width: 72rem; margin: 0 auto; padding: 20px 16px; }
        .sk {
          position: relative; overflow: hidden;
          border-radius: 16px; background: rgba(120, 130, 160, 0.13);
        }
        .dark .sk { background: rgba(255, 255, 255, 0.055); }
        .sk::after {
          content: ""; position: absolute; inset: 0; transform: translateX(-100%);
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
          animation: sk 1.3s ease-in-out infinite;
        }
        .dark .sk::after {
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent);
        }
        @keyframes sk { to { transform: translateX(100%); } }
        .sk-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 18px; }
        @media (max-width: 640px) { .sk-cards { grid-template-columns: 1fr; } }
      </style>
      <div class="sk-wrap" aria-hidden="true">
        <div class="sk" style="height: 52px; border-radius: 18px"></div>
        <div class="sk" style="height: 216px; margin-top: 22px; border-radius: 30px"></div>
        <div class="sk-row">
          <div class="sk" style="height: 88px"></div>
          <div class="sk" style="height: 88px"></div>
          <div class="sk" style="height: 88px"></div>
        </div>
        <div class="sk" style="height: 38px; margin-top: 18px; border-radius: 999px"></div>
        <div class="sk-row sk-cards">
          <div class="sk" style="height: 224px"></div>
          <div class="sk" style="height: 224px"></div>
          <div class="sk" style="height: 224px"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
